services:
  - type: web
    name: noei-kasir-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run db:init && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: noei-kasir-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: noei-kasir-db
    plan: free
    databaseName: noei_kasir
    user: noei_admin

